# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Spring Session disabled
spring.session.store-type=none

# JWT dummy secret (256+ bits for HS256)
jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration=3600000

# Mail dummy
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# AWS dummy
AWS_ACCESS_KEY_ID=dummy-access-key
AWS_SECRET_ACCESS_KEY=dummy-secret-key
spring.cloud.aws.credentials.accessKey=dummy-access-key
spring.cloud.aws.credentials.secretKey=dummy-secret-key
spring.cloud.aws.s3.bucket=test-bucket
spring.cloud.aws.region.static=ap-northeast-2
spring.cloud.aws.stack.auto=false
cloud.aws.region.auto=false
